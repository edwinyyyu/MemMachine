[build-system]
requires = ["setuptools>=68.0", "wheel", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "memmachine-server"
dynamic = ["version"]
dependencies = [
    "memmachine-common",
    "memmachine-core",
    "fastapi>=0.116.1",
    "fastmcp>=3.2.0",
    "uvicorn>=0.35.0",
    "pydantic>=2.11.7",
    "pyyaml>=6.0.2",
    "dotenv>=0.9.9",
    "psutil>=7.1.0",
    "tzdata>=2024.1 ; sys_platform == 'win32'",
]
requires-python = ">= 3.12"
authors = [
  {name="MemMachine", email="noreply@memmachine.ai"},
]
description = "MemMachine Server - HTTP/MCP server, resource manager, and configuration for the MemMachine memory engine"
readme = "README.md"
keywords = ["memmachine", "server", "memory", "ai", "agent"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
license = "Apache-2.0"

[project.optional-dependencies]
gpu = [
    "memmachine-core[gpu]",
]
hnswlib = [
    "memmachine-core[hnswlib]",
]
nebula = [
    "memmachine-core[nebula]",
]
qdrant = [
    "memmachine-core[qdrant]",
]
litellm = [
    "memmachine-core[litellm]",
]

[project.scripts]
memmachine-server = "memmachine_server.server.app:main"
memmachine-nltk-setup = "memmachine_server:setup_nltk"
memmachine-mcp-stdio = "memmachine_server.server.mcp_stdio:main"
memmachine-mcp-http = "memmachine_server.server.mcp_http:main"
memmachine-configure = "memmachine_server.installation.memmachine_configure:main"

[project.urls]
Homepage = "https://github.com/MemMachine/MemMachine"
Issues = "https://github.com/MemMachine/MemMachine/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"*" = ["*.md", "*.txt", "*.yml", "*.yaml", "*.sql"]

[tool.setuptools_scm]
root = "../.."

[tool.uv]
package = true

[tool.ty.environment]
python-version = "3.12"
# "." and "../core" keep `server_tests.*` / `core_tests.*` qualified
# test-helper imports resolvable (the server test suite re-uses core fixtures).
extra-paths = ["../common/src", "../core/src", "../client/src", ".", "../core"]

[tool.ty.src]
exclude = ["build/**"]

[tool.ruff]
extend = "../../pyproject.toml"
target-version = "py312"
